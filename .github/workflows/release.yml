name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-sign-release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bundle app
        run: make bundle

      - name: Import certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm "$CERT_PATH"

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Codesign app bundle
        run: |
          BUNDLE=".build/release/ClaudeBlobs.app"
          codesign --deep --force --options runtime \
            --sign "Developer ID Application:" \
            "$BUNDLE"
          # Verify
          codesign --verify --verbose "$BUNDLE"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUNDLE=".build/release/ClaudeBlobs.app"
          ZIP_PATH="$RUNNER_TEMP/ClaudeBlobs.zip"

          # Zip for notarization (notarytool requires zip, dmg, or pkg — not bare .app)
          ditto -c -k --keepParent "$BUNDLE" "$ZIP_PATH"

          # Submit and wait
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the .app
          xcrun stapler staple "$BUNDLE"

      - name: Create DMG
        id: dmg
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="ClaudeBlobs-${VERSION}.dmg"
          DMG_PATH="$RUNNER_TEMP/$DMG_NAME"
          BUNDLE=".build/release/ClaudeBlobs.app"

          # Create DMG from the stapled .app
          hdiutil create -volname "ClaudeBlobs" \
            -srcfolder "$BUNDLE" \
            -ov -format UDZO \
            "$DMG_PATH"

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Codesign and notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH="${{ steps.dmg.outputs.dmg_path }}"

          # Codesign DMG
          codesign --force --sign "Developer ID Application:" "$DMG_PATH"

          # Notarize DMG
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple DMG
          xcrun stapler staple "$DMG_PATH"

      - name: Compute SHA256
        id: sha
        run: |
          DMG_PATH="${{ steps.dmg.outputs.dmg_path }}"
          SHA=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "${PREV_TAG}..HEAD" | head -50)
          else
            COMMITS=$(git log --oneline | head -50)
          fi

          # Check for annotated tag message
          TAG_MSG=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME" 2>/dev/null || echo "")
          TAG_MSG=$(echo "$TAG_MSG" | sed '/^$/d')

          if [ -n "$TAG_MSG" ]; then
            echo "$TAG_MSG" > "$RUNNER_TEMP/release_notes.md"
          else
            printf "## Changes\n\n%s\n" "$COMMITS" > "$RUNNER_TEMP/release_notes.md"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_PATH="${{ steps.dmg.outputs.dmg_path }}"
          DMG_NAME="${{ steps.dmg.outputs.dmg_name }}"
          gh release create "$GITHUB_REF_NAME" \
            "$DMG_PATH#$DMG_NAME" \
            --title "ClaudeBlobs ${{ steps.version.outputs.version }}" \
            --notes-file "$RUNNER_TEMP/release_notes.md"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true

    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}

  update-homebrew:
    needs: build-sign-release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.build-sign-release.outputs.version }}"
          SHA256="${{ needs.build-sign-release.outputs.sha256 }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/kbrady1/homebrew-tap.git" tap
          cd tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p Casks
          printf 'cask "claude-blobs" do\n  version "%s"\n  sha256 "%s"\n\n  url "https://github.com/kbrady1/ClaudeBlobs/releases/download/v#{version}/ClaudeBlobs-#{version}.dmg"\n  name "ClaudeBlobs"\n  desc "macOS menu bar app for monitoring Claude agent sessions"\n  homepage "https://github.com/kbrady1/ClaudeBlobs"\n\n  app "ClaudeBlobs.app"\nend\n' "$VERSION" "$SHA256" > Casks/claude-blobs.rb

          git add Casks/claude-blobs.rb
          git commit -m "Update claude-blobs to $VERSION"
          git push
