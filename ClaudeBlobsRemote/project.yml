name: ClaudeBlobsRemote
options:
  bundleIdPrefix: com.claudeblobs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

targets:
  ClaudeBlobsRemote:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.xcodeproj"
          - "*.xcworkspace"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudeblobs.remote
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: ClaudeBlobs Remote
        INFOPLIST_KEY_NSCameraUsageDescription: "ClaudeBlobs Remote needs camera access to scan QR pairing codes from your Mac."
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "ClaudeBlobs Remote connects to your Mac over the local network to monitor and control Claude agents."
        INFOPLIST_KEY_NSBonjourServices: "(_claudeblobs._tcp)"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
